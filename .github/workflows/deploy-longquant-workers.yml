name: Deploy Long Quant trained workers

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Free build disk
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch finalized adapters from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          root=buildings/jarvis/longquant-cog/adapters
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p "$root/idea_long_r26" "$root/thumb_b10"
          aws s3 cp --recursive "s3://${R2_BUCKET_NAME}/hooks/models/idea_long_r26/" "$root/idea_long_r26/" --endpoint-url "$endpoint" --only-show-errors
          aws s3 cp --recursive "s3://${R2_BUCKET_NAME}/hooks/models/thumb_b10/" "$root/thumb_b10/" --endpoint-url "$endpoint" --only-show-errors
          test "$(shasum -a 256 "$root/idea_long_r26/adapter_model.safetensors" | cut -d' ' -f1)" = "56f3a4c46b2fe38aec58e68b06b307af03c10618e2d6d8e4bd423ee8a4201cf2"
          test "$(shasum -a 256 "$root/thumb_b10/adapter_model.safetensors" | cut -d' ' -f1)" = "2152f0e8fd27311da1820c9e7923a78406d402b58cc63a1640ca65a1dccc7799"
          for cfg in "$root"/*/adapter_config.json; do
            jq '.base_model_name_or_path = "Qwen/Qwen3-30B-A3B"' "$cfg" > "$cfg.tmp"
            mv "$cfg.tmp" "$cfg"
          done

      - name: Install Cog
        run: |
          sudo curl -fsSL -o /usr/local/bin/cog https://github.com/replicate/cog/releases/download/v0.21.0/cog_Linux_x86_64
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Authenticate Replicate registry
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: echo "$REPLICATE_API_TOKEN" | docker login r8.im -u tylercsatari --password-stdin

      - name: Import managed Qwen weights
        working-directory: buildings/jarvis/longquant-cog
        run: |
          df -h /
          cog weights import
          df -h /

      - name: Build and push private model
        working-directory: buildings/jarvis/longquant-cog
        run: cog push
