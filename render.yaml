services:
  - type: web
    name: businessworld
    env: node
    # NOTE: plan is intentionally NOT pinned here. Forcing a plan change in the
    # Blueprint (starter->standard) requires manual approval in the Render
    # dashboard and FREEZES auto-deploys until approved — which silently blocked
    # every deploy. The plan is managed in the dashboard instead (keep it on the
    # 2 GB / Standard plan there). Omitting it lets auto-deploys flow again.
    # Use `python3 -m pip` so the deps land in the SAME python3 the server spawns
    # (a bare `pip` installed into a different interpreter, so spawned python3
    # couldn't find numpy — the raw-upload "No module named numpy" failure).
    buildCommand: npm install && (python3 -m pip install -r requirements.txt || python3 -m pip install --break-system-packages -r requirements.txt || pip install -r requirements.txt)
    startCommand: bash start.sh
    autoDeploy: true
